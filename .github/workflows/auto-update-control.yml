name: Auto Update Control

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "enable or disable scheduled auto-update"
        required: true
        type: choice
        default: "disable"
        options:
          - "enable"
          - "disable"
      upstream_repo:
        description: "Required for enable. OWNER/REPO format."
        required: false
        default: ""
      upstream_branch:
        description: "Optional branch for enable. Defaults to main."
        required: false
        default: "main"
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write
  actions: write

jobs:
  configure:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      MODE: ${{ inputs.mode }}
      INPUT_UPSTREAM_REPO: ${{ inputs.upstream_repo }}
      INPUT_UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
      API_BASE: repos/${{ github.repository }}/actions/variables
    steps:
      - name: Set repository variables
        run: |
          set -euo pipefail

          upsert_variable() {
            local name="$1"
            local value="$2"
            if gh api --method PATCH "${API_BASE}/${name}" -f name="${name}" -f value="${value}" >/dev/null 2>&1; then
              echo "::notice::Updated variable ${name}"
            else
              gh api --method POST "${API_BASE}" -f name="${name}" -f value="${value}" >/dev/null
              echo "::notice::Created variable ${name}"
            fi
          }

          if [ "${MODE}" = "enable" ]; then
            if [ -z "${INPUT_UPSTREAM_REPO}" ]; then
              echo "::error::upstream_repo is required when mode=enable."
              exit 1
            fi
            if [[ ! "${INPUT_UPSTREAM_REPO}" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
              echo "::error::Invalid upstream_repo format. Use OWNER/REPO."
              exit 1
            fi

            upsert_variable "UPSTREAM_REPO" "${INPUT_UPSTREAM_REPO}"
            upsert_variable "UPSTREAM_BRANCH" "${INPUT_UPSTREAM_BRANCH:-main}"
            upsert_variable "AUTO_UPDATE_ENABLED" "true"

            {
              echo "## Auto-Update Configuration"
              echo ""
              echo "- Mode: enabled"
              echo "- Upstream: ${INPUT_UPSTREAM_REPO}"
              echo "- Branch: ${INPUT_UPSTREAM_BRANCH:-main}"
              echo "- Schedule: daily at 09:00 UTC"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            upsert_variable "AUTO_UPDATE_ENABLED" "false"
            {
              echo "## Auto-Update Configuration"
              echo ""
              echo "- Mode: disabled"
              echo "- Schedule runs will skip until re-enabled"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  scheduled_update:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check if auto-update is enabled
        id: gate
        env:
          AUTO_UPDATE_ENABLED: ${{ vars.AUTO_UPDATE_ENABLED }}
        run: |
          if [ "${AUTO_UPDATE_ENABLED}" != "true" ]; then
            echo "::notice::Auto-update disabled. Skipping scheduled sync."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Overwrite warning
        if: steps.gate.outputs.skip != 'true'
        run: |
          echo "::warning::Scheduled auto-update uses force-sync and may overwrite local repository changes."

      - name: Checkout repository
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force-sync from configured upstream
        if: steps.gate.outputs.skip != 'true'
        env:
          UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO }}
          UPSTREAM_BRANCH: ${{ vars.UPSTREAM_BRANCH }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [ -z "${UPSTREAM_REPO}" ]; then
            echo "::error::UPSTREAM_REPO is not set. Run Auto Update Control with mode=enable."
            exit 1
          fi

          if [[ ! "${UPSTREAM_REPO}" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid UPSTREAM_REPO format. Expected OWNER/REPO."
            exit 1
          fi

          upstream_branch="${UPSTREAM_BRANCH:-main}"
          target_branch="${DEFAULT_BRANCH:-main}"

          git fetch origin "${target_branch}"
          git checkout "${target_branch}"

          before_sha="$(git rev-parse HEAD)"
          echo "before_sha=${before_sha}" >> "$GITHUB_ENV"

          echo "::notice::Scheduled sync source is ${UPSTREAM_REPO}@${upstream_branch}"
          git fetch --no-tags --prune "https://github.com/${UPSTREAM_REPO}.git" "${upstream_branch}"
          git reset --hard FETCH_HEAD

          after_sha="$(git rev-parse HEAD)"
          echo "after_sha=${after_sha}" >> "$GITHUB_ENV"

          if [ "${before_sha}" = "${after_sha}" ]; then
            echo "::notice::Already up to date."
          else
            git push --force origin "HEAD:${target_branch}"
            echo "::notice::Scheduled force-sync push completed."
          fi

      - name: Deploy to Cloudflare
        if: ${{ steps.gate.outputs.skip != 'true' && env.before_sha != env.after_sha }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID not set. Skipping deploy."
            echo "deploy_skipped=true" >> "$GITHUB_ENV"
          else
            npm ci
            npx wrangler d1 migrations apply DB --remote
            npx wrangler deploy
            echo "deploy_skipped=false" >> "$GITHUB_ENV"
          fi

      - name: Summary
        if: steps.gate.outputs.skip != 'true'
        run: |
          {
            echo "## Scheduled Auto-Update Summary"
            echo ""
            echo "- Before SHA: ${before_sha:-unknown}"
            echo "- After SHA: ${after_sha:-unknown}"
            if [ "${before_sha}" != "${after_sha}" ]; then
              if [ "${deploy_skipped:-true}" = "true" ]; then
                echo "- Deploy: skipped (missing secrets)"
              else
                echo "- Deploy: success"
              fi
            else
              echo "- Deploy: skipped (no changes)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

