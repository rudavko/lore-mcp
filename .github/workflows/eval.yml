name: Retrieval Eval

on:
    push:
        paths:
            - "src/**"
            - "evals/**"
            - "migrations/**"
    pull_request:
        paths:
            - "src/**"
            - "evals/**"
            - "migrations/**"

jobs:
    eval:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: bun install --frozen-lockfile

            - name: Type check
              run: bun run type-check

            - name: Unit tests
              run: bun test

            - name: Run retrieval eval
              run: bun run evals/run.ts

            - name: Upload eval artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: eval-results
                  path: evals/artifacts/
