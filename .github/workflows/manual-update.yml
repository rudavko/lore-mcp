name: Manual Update

on:
    workflow_dispatch:
        inputs:
            confirm_overwrite:
                description: "Type yes to allow force-sync overwrite behavior"
                required: true
                type: choice
                default: "no"
                options:
                    - "no"
                    - "yes"
            upstream_repo:
                description: "Upstream repository in OWNER/REPO format (optional if UPSTREAM_REPO variable exists)"
                required: false
                default: ""
            upstream_branch:
                description: "Upstream branch to sync from"
                required: false
                default: "main"

permissions:
    contents: write

jobs:
    force_sync:
        runs-on: ubuntu-latest
        steps:
            - name: Overwrite warning
              run: |
                  echo "::warning::This workflow force-syncs from upstream and may overwrite local repository changes."

            - name: Validate confirmation
              if: ${{ inputs.confirm_overwrite != 'yes' }}
              run: |
                  echo "::error::Set confirm_overwrite=yes to run this workflow."
                  exit 1

            - name: Checkout repository
              if: ${{ inputs.confirm_overwrite == 'yes' }}
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Force-sync from upstream
              if: ${{ inputs.confirm_overwrite == 'yes' }}
              env:
                  INPUT_UPSTREAM_REPO: ${{ inputs.upstream_repo }}
                  INPUT_UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
                  VAR_UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO }}
                  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
              run: |
                  set -euo pipefail

                  upstream_repo="${INPUT_UPSTREAM_REPO}"
                  if [ -z "${upstream_repo}" ]; then
                    upstream_repo="${VAR_UPSTREAM_REPO}"
                  fi

                  if [ -z "${upstream_repo}" ]; then
                    echo "::error::Missing upstream repository. Provide input upstream_repo or set repository variable UPSTREAM_REPO."
                    exit 1
                  fi

                  if [[ ! "${upstream_repo}" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
                    echo "::error::Invalid upstream_repo format. Use OWNER/REPO."
                    exit 1
                  fi

                  upstream_branch="${INPUT_UPSTREAM_BRANCH:-main}"
                  target_branch="${DEFAULT_BRANCH:-main}"

                  git fetch origin "${target_branch}"
                  git checkout "${target_branch}"

                  before_sha="$(git rev-parse HEAD)"
                  echo "before_sha=${before_sha}" >> "$GITHUB_ENV"

                  echo "::notice::Sync source is ${upstream_repo}@${upstream_branch}"
                  git fetch --no-tags --prune "https://github.com/${upstream_repo}.git" "${upstream_branch}"
                  git reset --hard FETCH_HEAD

                  after_sha="$(git rev-parse HEAD)"
                  echo "after_sha=${after_sha}" >> "$GITHUB_ENV"

                  if [ "${before_sha}" = "${after_sha}" ]; then
                    echo "::notice::Already up to date. No push required."
                  else
                    git push --force origin "HEAD:${target_branch}"
                    echo "::notice::Force-sync push completed."
                  fi

            - name: Deploy to Cloudflare
              if: ${{ inputs.confirm_overwrite == 'yes' && env.before_sha != env.after_sha }}
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: |
                  if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
                    echo "::warning::CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID not set. Skipping deploy."
                    echo "deploy_skipped=true" >> "$GITHUB_ENV"
                  else
                    npm ci
                    npx wrangler d1 migrations apply DB --remote
                    npx wrangler deploy
                    echo "deploy_skipped=false" >> "$GITHUB_ENV"
                  fi

            - name: Summary
              if: ${{ inputs.confirm_overwrite == 'yes' }}
              run: |
                  {
                    echo "## Manual Update Summary"
                    echo ""
                    echo "- Overwrite mode: force-sync enabled"
                    echo "- Before SHA: ${before_sha:-unknown}"
                    echo "- After SHA: ${after_sha:-unknown}"
                    if [ "${before_sha}" != "${after_sha}" ]; then
                      if [ "${deploy_skipped:-true}" = "true" ]; then
                        echo "- Deploy: skipped (missing secrets)"
                      else
                        echo "- Deploy: success"
                      fi
                    else
                      echo "- Deploy: skipped (no changes)"
                    fi
                  } >> "$GITHUB_STEP_SUMMARY"
