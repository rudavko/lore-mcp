name: Upstream Sync

on:
  schedule:
    - cron: "40 4 * * *"
  workflow_dispatch:
    inputs:
      force_overwrite:
        description: Overwrite target branch when history diverges from upstream/main.
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.repository.default_branch }}
      FORCE_OVERWRITE: ${{ github.event.inputs.force_overwrite || vars.FORCE_OVERWRITE || 'true' }}
      UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO || 'rudavko/lore-mcp' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Configure upstream remote
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${UPSTREAM_REPO}" ]; then
            UPSTREAM_REPO="rudavko/lore-mcp"
          fi
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream main

      - name: Sync default branch from upstream/main
        shell: bash
        run: |
          set -euo pipefail
          git checkout "${TARGET_BRANCH}"

          overwrite="false"
          if git merge-base --is-ancestor HEAD upstream/main; then
            git merge --ff-only upstream/main
          elif [ "${FORCE_OVERWRITE}" = "true" ]; then
            git reset --hard upstream/main
            overwrite="true"
          else
            echo "History diverged. Set FORCE_OVERWRITE=true to allow hard reset."
            exit 1
          fi

          if [ "${overwrite}" = "true" ]; then
            git push origin "HEAD:${TARGET_BRANCH}" --force-with-lease
          else
            git push origin "HEAD:${TARGET_BRANCH}"
          fi
