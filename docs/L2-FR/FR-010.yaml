id: FR-010
title: Bulk ingest content
phase: 1
statement: >
  When an agent calls ingest with text content, the system extracts and
  stores knowledge entries synchronously for small inputs or asynchronously
  for large inputs, with deduplication, so that agents can load bulk
  knowledge in one call.
traces:
  - Charter 3.1: Deliver the system described in L1-vision.md
  - EC-002: D1 row size limits
verification:
  manual:
    - Ingest small text, verify entries created; ingest large text, check ingestion_status
  machine:
    - E2E: ingest small content, query, assert entries created
    - E2E: ingest large content, poll ingestion_status, assert completed
