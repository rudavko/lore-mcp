id: FR-004
title: Expand retrieval with explicit and auto links
phase: 1
statement: >
  When an agent calls retrieve with include_links and/or
  include_auto_links,
  the system expands returned objects with explicit stored links and
  engine-derived auto links so that retrieval can return local graph context
  without a second public call.
traces:
  - Charter 3.1: Deliver the system described in L1-vision.md
  - CC-002: Cross-agent knowledge sharing
  - CC-005: Retrieval relevance
verification:
  manual:
    - Create linked objects, call retrieve with link-expansion flags, and verify the response includes explicit and derived link context
  machine:
    - E2E: link_object creates a link and retrieve(include_links=true) returns it alongside the matching object
    - E2E: retrieve(include_auto_links=true) returns supported engine-derived links for matching objects
