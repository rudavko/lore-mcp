id: FR-020
title: Namespace and project scoping (future public contract)
phase: 2
statement: >
  When a future public contract adds explicit namespace or project inputs, the
  system scopes object creation and retrieval by that boundary so that an
  agent working on project A does not receive results from project B unless
  explicitly requested. This remains deferred because the current v0 public
  tool schemas do not expose namespace or project parameters.
traces:
  - Charter 3.1: Deliver the system described in L1-vision.md
  - CC-002: Cross-agent knowledge sharing
  - QAW scenario 14: Accidental scope leakage
verification:
  manual:
    - In a future scoped contract, store knowledge in namespace A, query from namespace B, and verify it is not returned
    - In a future scoped contract, query from namespace A and verify the scoped knowledge is returned
  machine:
    - E2E: future scoped object_create and retrieve isolate knowledge by namespace
    - E2E: future unscoped retrieval remains explicitly backward compatible if the public contract allows it
