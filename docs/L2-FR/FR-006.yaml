id: FR-006
title: Record mutation history
phase: 1
statement: >
  The system records public mutations in the transaction log and exposes that
  audit trail through engine_check(action="history") so that mutation history
  is a system guarantee instead of a standalone public tool contract.
traces:
  - Charter 3.1: Deliver the system described in L1-vision.md
  - CC-006: Undo capability
  - CC-007: Provenance tracking
verification:
  manual:
    - Create and update objects, then inspect engine_check(history) and verify the mutations are recorded
  machine:
    - E2E: object_create(note), engine_check(history), assert the creation mutation is present
    - E2E: link_object update, engine_check(history), assert the link mutation is present with transaction snapshots
