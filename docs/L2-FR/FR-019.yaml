id: FR-019
title: Engine status overview
phase: 2
statement: >
  When an agent calls engine_check with action="status", the system returns a
  concise overview of instance state including object counts, last write
  timestamp, and build identity so that agents can assess what is in the
  engine without a separate summary tool.
traces:
  - Charter 3.1: Deliver the system described in L1-vision.md
  - CC-004: Non-technical deployment
  - QAW scenario 12: Knowledge discoverability
verification:
  manual:
    - Call engine_check(status) before and after writes, and verify the overview reflects the instance state
  machine:
    - E2E: engine_check(status) returns counts and build metadata after object creation
    - E2E: engine_check(status) on an empty instance returns zero counts without error
