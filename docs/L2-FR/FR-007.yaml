id: FR-007
title: Preserve first-class entity metadata
phase: 1
statement: >
  When an agent calls object_create with kind="entity", the system stores and
  retrieves first-class entity metadata including entity_type, source,
  confidence, valid_from, valid_to, tags, produced_by, about, affects, and
  specificity so that entity facts are preserved structurally instead of being
  flattened into note text.
traces:
  - Charter 3.1: Deliver the system described in L1-vision.md
  - CC-002: Cross-agent knowledge sharing
  - CC-007: Provenance tracking
verification:
  manual:
    - Create an entity with first-class metadata, retrieve it, and verify the metadata is preserved in the returned entity object
  machine:
    - E2E: object_create(entity) persists first-class metadata and retrieve returns it
    - E2E: object_create(entity) with validity and tags returns those fields unchanged on retrieval
