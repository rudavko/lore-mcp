id: FR-002
title: Retrieve knowledge
phase: 1
statement: >
  When an agent calls retrieve with query and optional pagination and as_of
  inputs, the system returns a paginated mixed result set across notes,
  entities, and links so that clients can search stored knowledge through one
  heterogeneous retrieval path.
traces:
  - Charter 3.1: Deliver the system described in L1-vision.md
  - CC-005: Retrieval relevance
  - EC-004: Vectorize optional — degrade gracefully without it
verification:
  manual:
    - Create a note, entity, and link, then call retrieve and verify relevant results can be returned without choosing a per-type query tool
  machine:
    - E2E: object_create(note), retrieve, assert the created note is returned
    - E2E: object_create(entity), retrieve, assert the entity is returned with mixed result kinds allowed in one page
    - E2E: retrieve with cursor and limit, assert pagination advances through a mixed result set
    - E2E: retrieve with as_of, assert inactive objects are filtered out
