id: FR-001
title: Store knowledge entry
phase: 1
statement: >
  When an agent calls store with topic and content, the system persists a
  knowledge entry with provenance fields (tags, source, actor, confidence)
  and returns the created entry so that knowledge accumulates across sessions.
traces:
  - Charter 3.1: Deliver the system described in L1-vision.md
  - CC-002: Cross-agent knowledge sharing
  - CC-007: Provenance tracking
verification:
  manual:
    - Call store with topic and content, verify entry is retrievable via query
  machine:
    - E2E: store entry, query by topic, assert entry fields match input
